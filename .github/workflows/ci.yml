name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=lotr_test;Username=postgres;Password=postgres"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore api-server/backend/LotrApi.slnx

      - name: Build
        run: dotnet build api-server/backend/LotrApi.slnx --no-restore --configuration Release

      - name: Initialize test database schema
        env:
          PGPASSWORD: postgres
        run: |
          cd api-server/backend/src/database
          psql -h localhost -U postgres -d lotr_test -f reset.sql
          psql -h localhost -U postgres -d lotr_test -f init.sql

      - name: Run tests
        run: >
          dotnet test api-server/backend/LotrApi.slnx
          --no-build
          --configuration Release
          --verbosity normal
          --logger "console;verbosity=normal"
