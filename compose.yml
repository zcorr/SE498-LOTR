services:

  # --- PostgreSQL database for the API server ---
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: lotr
      POSTGRES_PASSWORD: lotr
      POSTGRES_DB: lotr
    ports:
      - "5433:5432"           # lets you connect from your host machine (DBeaver, psql, etc.)
    volumes:
      # This auto-runs init.sql when the container is created for the first time
      - ./api-server/backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data   # persists your data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotr -d lotr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- C# Web Server ---
  api:
    build:
      context: ./api-server/backend/src   # Docker's working directory for the build
      dockerfile: LotrApi/Dockerfile       # path to Dockerfile, relative to context
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # This overrides appsettings.json — double underscore means nested key in .NET config
      # Reads as: ConnectionStrings.DefaultConnection
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=lotr;Username=lotr;Password=lotr"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      db:
        condition: service_healthy    # waits for db to be healthy before starting api

  # --- PostgreSQL database for the Web server ---
  web-db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: lotr
      POSTGRES_PASSWORD: lotr
      POSTGRES_DB: web_lotr
    ports:
      - "5434:5432"           # different port to avoid conflicts
    volumes:
      - web_db_data:/var/lib/postgresql/data   # persists your data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotr -d web_lotr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Node.js Web Server ---
  web:
    build:
      context: ./web-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: web-db
      DB_PORT: 5432
      DB_NAME: web_lotr
      DB_USER: lotr
      DB_PASSWORD: lotr
      ASPNETCORE_URLS: http://0.0.0.0:3000
    depends_on:
      web-db:
        condition: service_healthy
      api:
        condition: service_started  # just started, since api waits for db

volumes:
  db_data:  # named volume so Postgres data survives container restarts
  web_db_data:
